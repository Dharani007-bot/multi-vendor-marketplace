<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <title>Add Product - VendorHub</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f1f5f9;
            min-height: 100vh;
        }
        .topbar {
            background: white;
            border-bottom: 1px solid #e8eaf0;
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .brand {
            font-size: 20px;
            font-weight: 800;
            color: #1a56db;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }
        .breadcrumb-nav {
            font-size: 13px;
            color: #6b7280;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .breadcrumb-nav a {
            color: #1a56db;
            text-decoration: none;
            font-weight: 500;
        }
        .main {
            padding: 40px;
            max-width: 680px;
            margin: 0 auto;
        }
        .page-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 32px;
        }
        .page-icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            background: #f5f3ff;
            color: #7c3aed;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .page-header h1 {
            font-size: 24px;
            font-weight: 800;
            color: #1a1a2e;
            margin-bottom: 2px;
        }
        .page-header p {
            font-size: 14px;
            color: #6b7280;
            margin: 0;
        }
        .form-card {
            background: white;
            border: 1px solid #e8eaf0;
            border-radius: 20px;
            padding: 36px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.05);
        }
        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
            display: block;
        }
        .form-control, .form-select {
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 14px;
            color: #1a1a2e;
            width: 100%;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
            margin-bottom: 20px;
        }
        .form-control:focus, .form-select:focus {
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124,58,237,0.1);
        }
        textarea.form-control { resize: vertical; min-height: 100px; }
        /* Django form fields */
        form input[type=text], form input[type=number],
        form textarea, form select, form input[type=file] {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            font-size: 14px;
            color: #1a1a2e;
            outline: none;
            margin-bottom: 20px;
            transition: border-color 0.2s;
            background: white;
        }
        form input:focus, form textarea:focus {
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124,58,237,0.1);
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #7c3aed, #1a56db);
            color: white;
            font-size: 15px;
            font-weight: 700;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s;
        }
        .btn-submit:hover {
            opacity: 0.92;
            transform: translateY(-1px);
        }
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 16px;
            color: #6b7280;
            font-size: 14px;
            text-decoration: none;
            font-weight: 500;
        }
        .btn-back:hover { color: #1a56db; }
    </style>
</head>
<body>

<div class="topbar">
    <a class="brand" href="/"><i class="bi bi-shop"></i> VendorHub</a>
    <div class="breadcrumb-nav">
        <a href="/dashboard/">Dashboard</a>
        <i class="bi bi-chevron-right"></i>
        <span>Add Product</span>
    </div>
</div>

<div class="main">
    <div class="page-header">
        <div class="page-icon"><i class="bi bi-plus-square-fill"></i></div>
        <div>
            <h1>Add Product</h1>
            <p>Fill in the details to list a new product</p>
        </div>
    </div>

    <div class="form-card">
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <label class="form-label">Product Name</label>
            {{ form.product_name }}

            <label class="form-label">Description</label>
            {{ form.description }}

            <label class="form-label">Price (₹)</label>
            {{ form.price }}

            <label class="form-label">Product Image</label>
            {{ form.product_image }}

            <button type="submit" class="btn-submit">
                <i class="bi bi-check-circle me-2"></i>Save Product
            </button>
        </form>
        <a href="/dashboard/" class="btn-back">
            <i class="bi bi-arrow-left"></i> Back to Dashboard
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
